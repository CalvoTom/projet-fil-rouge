services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8008:8008"
    volumes:
      - ./models:/app/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8008/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8008
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
